name: foss-mirror

on:
  push:
    branches:
      - main

jobs:
  build-rsync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push foss-mirror-rsync
        uses: docker/build-push-action@v6
        with:
          context: rsync
          file: rsync/Containerfile
          push: true
          tags: ghcr.io/jgrancell/foss-mirror/rsync:latest

  build-nginx:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push foss-mirror-nginx
        uses: docker/build-push-action@v6
        with:
          context: nginx
          file: nginx/Containerfile
          push: true
          tags: ghcr.io/jgrancell/foss-mirror/nginx:latest
